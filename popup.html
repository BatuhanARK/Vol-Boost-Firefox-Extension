<!DOCTYPE html>
<html lang="en">
<head>
<title>Volume Booster</title>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --accent-dim: #b8cc2a;
    --text: #f0f0f0;
    --text-muted: #666;
    --danger: #ff4747;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    width: 230px;
    padding: 16px;
    user-select: none;
    zoom: 1.5;
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .version {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* Big value display */
  .display {
    text-align: center;
    margin-bottom: 14px;
    position: relative;
  }

  .display-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    color: var(--accent);
    transition: color 0.25s;
    letter-spacing: 2px;
  }

  .display-unit {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 3px;
    margin-top: 2px;
  }

  /* Slider */
  .slider-wrap {
    margin-bottom: 14px;
    position: relative;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    position: relative;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(232,255,71,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 14px rgba(232,255,71,0.7);
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
    font-size: 8px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  /* Preset buttons */
  .presets-label {
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 7px;
    text-transform: uppercase;
  }

  .presets {
    display: flex;
    gap: 5px;
  }

  .preset-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 6px 2px;
    border-radius: 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .preset-btn:hover {
    opacity: 0.85;
  }

  .preset-btn.active {
    border-color: var(--accent);
    color: var(--bg);
    background: var(--accent);
    font-weight: 700;
  }

  .preset-btn.active.danger-btn {
    border-color: var(--danger);
    background: var(--danger);
    color: #fff;
  }

  /* Footer bar */
  .footer {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    flex-shrink: 0;
  }

  .status-text {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <span class="title">VOL BOOST</span>
  <span class="version">v1.0</span>
</div>

<div class="display">
  <div class="display-value" id="displayValue">100</div>
  <div class="display-unit">PERCENT</div>
</div>

<div class="slider-wrap">
  <input id="slider" type="range" min="0" max="600" step="10" value="100">
  <div class="slider-labels">
    <span>0</span>
    <span>100</span>
    <span>200</span>
    <span>300</span>
    <span>400</span>
    <span>500</span>
    <span>600</span>
  </div>
</div>

<div class="presets-label">Quick presets</div>
<div class="presets">
  <button class="preset-btn" data-value="0">0</button>
  <button class="preset-btn active" data-value="100">100</button>
  <button class="preset-btn" data-value="200">200</button>
  <button class="preset-btn" data-value="400">400</button>
  <button class="preset-btn danger-btn" data-value="600">600</button>
</div>

<div class="footer">
  <div class="status-dot"></div>
  <span class="status-text">ACTIVE ON THIS TAB</span>
</div>

<script src="popup.js"></script>
</body>
</html>
